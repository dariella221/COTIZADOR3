<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figuras de Coroplast | Cotizador Pro</title>
    <style>
        :root {
            --primary: #4bb5ff;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --border: #334155;
            --accent: #22c55e;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
        }

        .header-brand { text-align: center; margin-bottom: 25px; }
        .header-brand h1 { margin: 0; font-size: 26px; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }
        .header-brand p { margin: 5px 0 0; color: #94a3b8; font-size: 12px; font-weight: bold; }

        .card { 
            width: 100%; 
            max-width: 380px; 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.4); 
            border: 1px solid var(--border); 
        }

        .input-row { display: flex; gap: 15px; margin-bottom: 20px; }
        .input-group { flex: 1; }
        label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; font-weight: bold; }
        
        input { 
            width: 100%; padding: 15px; background: #0f172a; border: 2px solid var(--border); 
            border-radius: 14px; color: #fff; font-size: 18px; box-sizing: border-box; outline: none;
            transition: border-color 0.3s;
        }
        input:focus { border-color: var(--primary); }

        button { 
            width: 100%; padding: 18px; background: var(--primary); color: #fff; border: none; 
            border-radius: 14px; font-size: 16px; font-weight: 800; cursor: pointer; transition: 0.3s;
            text-transform: uppercase;
        }
        button:active { transform: scale(0.98); }

        .tabla-sumas { 
            width: 100%; max-width: 380px; margin-top: 25px; background: var(--card-bg); 
            border-radius: 20px; border: 1px solid var(--border); overflow: hidden; display: none; 
            animation: fadeIn 0.4s ease-out;
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(0,0,0,0.2); padding: 12px; text-align: left; color: var(--primary); font-size: 10px; text-transform: uppercase; }
        td { padding: 14px 12px; border-bottom: 1px solid var(--border); font-size: 15px; }
        
        .total-area { padding: 20px; background: rgba(0,0,0,0.3); text-align: right; border-top: 2px solid var(--primary); }
        .total-label { color: #94a3b8; font-size: 12px; display: block; margin-bottom: 4px; }
        .total-final { font-size: 34px; font-weight: 900; color: #fff; }
        
        .btn-borrar { color: #ff5252; background: none; border: none; cursor: pointer; font-size: 22px; font-weight: bold; padding: 0 10px; }
        .badge { background: #334155; color: #cbd5e1; font-size: 9px; padding: 2px 6px; border-radius: 4px; margin-left: 5px; vertical-align: middle; }
    </style>
</head>
<body>

<div class="header-brand">
    <h1>FIGURAS DE COROPLAST</h1>
    <p>MONTERREY • COTIZADOR DE PRECIOS</p>
</div>

<div class="card">
    <div class="input-row">
        <div class="input-group">
            <label>Ancho (cm)</label>
            <input type="number" id="ancho" placeholder="0" autofocus>
        </div>
        <div class="input-group">
            <label>Largo (cm)</label>
            <input type="number" id="largo" placeholder="0">
        </div>
    </div>
    <button onclick="calcular()">Agregar al pedido</button>
</div>

<div class="tabla-sumas" id="listaContenedor">
    <table>
        <thead>
            <tr>
                <th>DESCRIPCIÓN</th>
                <th style="text-align: right;">PRECIO</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="cuerpoTabla"></tbody>
    </table>
    <div class="total-area">
        <span class="total-label">TOTAL A PAGAR:</span>
        <span class="total-final" id="totalSuma">$0.00</span>
    </div>
</div>

<script>
    let piezas = [];

    function calcular() {
        const a = parseFloat(document.getElementById('ancho').value);
        const l = parseFloat(document.getElementById('largo').value);
        
        if (!a || !l) return;

        // --- PARÁMETROS DE NEGOCIO ---
        const PRECIO_M2 = 365;
        const UMBRAL_LARGO = 100;
        const VENTA_MINIMA = 60;
        const PRECIO_HOJA_COMPLETA = 1150;
        let RECARGO_UNITARIO = 2.89;

        let m2 = (a * l) / 10000;
        let costoBase = m2 * PRECIO_M2;
        let ladoMayor = Math.max(a, l);

        // --- LÓGICA DE SUAVIZADO PARA PIEZAS GRANDES ---
        // Si la pieza supera los 1.5 m2, aplicamos descuento del 35% al recargo
        if (m2 > 1.5) {
            RECARGO_UNITARIO = RECARGO_UNITARIO * 0.65; 
        }

        let recargo = (ladoMayor > UMBRAL_LARGO) ? (ladoMayor - UMBRAL_LARGO) * RECARGO_UNITARIO : 0;
        let total = costoBase + recargo;

        // --- TOPE DE HOJA COMPLETA ---
        if (m2 >= 2.8) {
            total = PRECIO_HOJA_COMPLETA;
        }

        // --- PROTECCIÓN VENTA MÍNIMA ---
        let tipo = "";
        if (total < VENTA_MINIMA) {
            total = VENTA_MINIMA;
            tipo = "MIN";
        }

        // AGREGAR A LA LISTA
        piezas.push({
            desc: `${a} x ${l} cm`,
            precio: total,
            tipo: tipo
        });

        renderizar();
        
        // Limpiar campos para la siguiente
        document.getElementById('ancho').value = '';
        document.getElementById('largo').value = '';
        document.getElementById('ancho').focus();
    }

    function eliminar(index) {
        piezas.splice(index, 1);
        renderizar();
    }

    function renderizar() {
        const lista = document.getElementById('listaContenedor');
        const cuerpo = document.getElementById('cuerpoTabla');
        const totalTxt = document.getElementById('totalSuma');
        
        cuerpo.innerHTML = '';
        let sumaTotal = 0;

        if (piezas.length > 0) {
            lista.style.display = 'block';
        } else {
            lista.style.display = 'none';
        }

        piezas.forEach((p, i) => {
            sumaTotal += p.precio;
            cuerpo.innerHTML += `
                <tr>
                    <td>
                        <strong>${p.desc}</strong>
                        ${p.tipo ? `<span class="badge">${p.tipo}</span>` : ''}
                    </td>
                    <td style="text-align: right; font-weight: bold; color: var(--accent);">$${p.precio.toFixed(2)}</td>
                    <td style="text-align: center;">
                        <button class="btn-borrar" onclick="eliminar(${i})">&times;</button>
                    </td>
                </tr>
            `;
        });

        totalTxt.innerText = `$${sumaTotal.toFixed(2)}`;
    }
</script>

</body>
</html>
